  </head>
  <body>
    <div id="root">
      <!-- Loading state shown while React is loading -->
      <div id="initial-loading" style="
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #18181c;
        color: #e5e6eb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      ">
        <div style="
          width: 40px;
          height: 40px;
          border: 3px solid #3f3f46;
          border-top-color: #3c82ff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
        <p style="margin-top: 16px; color: #86868b;">正在加载...</p>
        <noscript>
          <div style="
            margin-top: 20px;
            padding: 16px 24px;
            background: rgba(245, 63, 63, 0.1);
            border-radius: 8px;
            color: #ff5252;
            text-align: center;
          ">
            <p style="margin: 0; font-weight: 500;">JavaScript 已禁用</p>
            <p style="margin: 8px 0 0 0; font-size: 14px; color: #b9b9bd;">
              请启用 JavaScript 以使用 AlphaArena
            </p>
          </div>
        </noscript>
      </div>
      <style>
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/client/main.tsx"></script>
    <!-- Error detection script - shows error message if React fails to load -->
    <script>
      // Hide initial loading after React renders
      const observer = new MutationObserver(function(mutations) {
        const root = document.getElementById('root');
        const loading = document.getElementById('initial-loading');
        if (root && loading && root.children.length > 1) {
          loading.remove();
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      
      // Timeout to show error if React doesn't render within 10 seconds
      setTimeout(function() {
        var loading = document.getElementById('initial-loading');
        var root = document.getElementById('root');
        if (loading && root && root.children.length === 1) {
          loading.innerHTML = '\
            <div style="text-align: center; padding: 24px;">\
              <h2 style="color: #ff5252; margin-bottom: 16px;">页面加载失败</h2>\
              <p style="color: #b9b9bd; margin-bottom: 24px;">请尝试刷新页面，或检查网络连接</p>\
              <button onclick="location.reload()" style="\
                padding: 12px 24px;\
                background: #3c82ff;\
                color: white;\
                border: none;\
                border-radius: 8px;\
                cursor: pointer;\
                font-size: 16px;\
              ">刷新页面</button>\
              <p style="margin-top: 16px; font-size: 12px; color: #7d7d85;">\
                如果问题持续存在，请尝试清除浏览器缓存\
              </p>\
            </div>';
        }
      }, 10000);
    </script>
  </body>
