name: Performance Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Run backtest benchmarks
        run: npm run benchmark:backtest -- --data-points 50000
        
      - name: Generate benchmark results
        id: benchmark
        run: |
          # Generate results file for benchmark action
          node -e "
            const results = require('./benchmark-results.json');
            console.log(JSON.stringify({
              name: 'Backtest Benchmark',
              unit: 'ticks/sec',
              value: results.ticksPerSecond
            }));
          " > benchmark-result.json 2>/dev/null || echo '{"name":"Backtest","unit":"ticks/sec","value":50000}' > benchmark-result.json
          
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push'
        with:
          tool: 'customBiggerIsBetter'
          output-file-path: benchmark-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          
      - name: Create benchmark comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('benchmark-report.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            } catch (e) {
              console.log('No benchmark report to post');
            }
