name: Performance Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Run backtest benchmarks
        run: npm run benchmark:backtest -- --data-points 50000 -o benchmark-report.md
        continue-on-error: true
        id: benchmark
        
      - name: Check for benchmark report
        id: check-report
        run: |
          if [ -f benchmark-report.md ]; then
            echo "report_exists=true" >> $GITHUB_OUTPUT
          else
            echo "report_exists=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Create benchmark comment
        if: github.event_name == 'pull_request' && steps.check-report.outputs.report_exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('benchmark-report.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            } catch (e) {
              console.log('No benchmark report to post');
            }
            
      - name: Upload benchmark report
        if: steps.check-report.outputs.report_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.md
          retention-days: 30
