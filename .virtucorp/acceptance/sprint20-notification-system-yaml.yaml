web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "验证通知系统功能"
    flow:
      - ai: "访问首页并等待页面完全加载"
      - aiAssert: "页面顶部导航栏有一个通知铃铛图标"
      - ai: "点击通知铃铛图标"
      - aiWaitFor: "通知下拉面板或通知列表出现"
      - aiAssert: "通知面板显示通知列表或空状态提示"
      - ai: "检查通知列表中是否有通知项"
      - aiQuery: "提取通知列表中的通知数量和类型"
