web:
  url: "http://localhost:3000/pricing"

tasks:
  - name: "Check pricing page"
    flow:
      - aiWaitFor: "Page loads completely"
      - aiAssert: "Page shows pricing plans with subscription tiers (Free, Pro, Enterprise or similar)"
      - aiAssert: "Page does NOT show welcome modal or dashboard layout"
      - aiAssert: "Page has pricing information visible"
