web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "首页加载验证"
    flow:
      - aiWaitFor: "页面完全加载，导航栏可见"
      - aiAssert: "页面标题或Logo显示 AlphaArena 或相关名称"
      - aiAssert: "导航栏包含主要导航链接"
      - aiAssert: "页面主体内容正常显示，无错误提示"
  - name: "策略市场验证"
    flow:
      - ai: "点击导航栏中的策略市场或 Strategy Market 链接"
      - aiWaitFor: "策略市场页面加载完成"
      - aiAssert: "策略市场页面显示策略列表或相关内容"
      - aiAssert: "页面无 JavaScript 错误或空白区域"
  - name: "公共 API 文档验证"
    flow:
      - ai: "点击导航栏中的 API 文档或 Documentation 链接"
      - aiWaitFor: "API 文档页面加载完成"
      - aiAssert: "API 文档页面显示接口列表或 API 相关内容"
      - aiAssert: "文档内容可读，格式正确"
  - name: "多账户管理页面验证"
    flow:
      - ai: "导航到多账户管理或 Account Management 页面"
      - aiWaitFor: "账户管理页面加载完成"
      - aiAssert: "账户管理相关 UI 元素可见"
      - aiAssert: "页面功能正常，无报错"
