web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "访问订单面板"
    flow:
      - ai: "导航到交易页面或 Trade 菜单"
      - aiWaitFor: "K 线图表和订单面板加载"
      - aiAssert: "页面显示了订单面板或下单区域"
  - name: "查看高级订单类型选项"
    flow:
      - ai: "查找订单类型选择器，通常显示 '限价单'、'市价单' 等选项"
      - aiAssert: "存在订单类型选择器或下拉菜单"
      - ai: "点击订单类型选择器打开下拉菜单"
      - aiAssert: "下拉菜单中显示了高级订单类型选项，如 TWAP、Iceberg/冰山、OCO 等"
  - name: "测试 TWAP 订单"
    flow:
      - ai: "选择 TWAP 订单类型（如果有）"
      - aiAssert: "TWAP 订单配置面板显示，包含持续时间、间隔等参数"
      - ai: "查看 TWAP 参数配置选项"
  - name: "测试冰山订单"
    flow:
      - ai: "返回订单类型选择器"
      - ai: "选择冰山订单类型（如果有）"
      - aiAssert: "冰山订单配置面板显示，包含显示数量等参数"
  - name: "测试 OCO 订单"
    flow:
      - ai: "返回订单类型选择器"
      - ai: "选择 OCO 订单类型（如果有）"
      - aiAssert: "OCO 订单配置面板显示，包含止盈、止损价格等参数"
