web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "查找导出功能入口"
    flow:
      - ai: "访问首页并等待页面完全加载"
      - aiQuery: "提取页面上所有导航菜单项和链接，找出可能包含导出功能的页面"
      - ai: "点击用户相关的菜单或头像，查看是否有个人绩效、交易历史等入口"
      - aiQuery: "提取下拉菜单中的所有选项"
      - ai: "查找并点击可能包含导出功能的页面链接（如绩效、历史、报表等）"
      - aiWaitFor: "新页面加载完成"
      - ai: "在新页面上查找导出按钮或导出功能"
      - aiQuery: "提取该页面是否有导出相关的功能或按钮"
