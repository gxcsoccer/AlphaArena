web:
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "Pricing Page Verification"
    flow:
      - ai: "Navigate to /pricing"
      - aiAssert: "Page displays VIP pricing plans"
      - aiAssert: "At least one paid plan is visible with price information"
  - name: "Language Switching"
    flow:
      - ai: "Find and click the language selector"
      - ai: "Switch to zh-CN (Chinese Simplified)"
      - aiAssert: "Page content changes to Chinese"
      - ai: "Switch to en-US (English)"
      - aiAssert: "Page content changes to English"
      - ai: "Switch to ja-JP (Japanese)"
      - aiAssert: "Page content changes to Japanese"
      - ai: "Switch to ko-KR (Korean)"
      - aiAssert: "Page content changes to Korean"
  - name: "Settings Page"
    flow:
      - ai: "Navigate to /settings or find settings in navigation"
      - aiAssert: "Settings page loads successfully"
      - aiAssert: "Subscription status section is visible"
  - name: "Privacy Settings"
    flow:
      - ai: "Navigate to /privacy"
      - aiAssert: "Privacy settings page loads successfully"
      - aiAssert: "GDPR-related options or information are displayed"
