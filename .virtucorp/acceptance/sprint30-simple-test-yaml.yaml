web:
  url: "https://alpha-arena.vercel.app"

tasks:
  - name: "主页加载测试"
    flow:
      - ai: "访问主页 https://alpha-arena.vercel.app 并等待加载完成"
      - ai: "如果有新手引导弹窗，点击关闭或跳过按钮"
      - aiAssert: "页面正常显示，可以看到导航菜单和主界面"
  - name: "虚拟账户页面验证"
    flow:
      - ai: "在地址栏直接访问 /virtual-account 页面"
      - aiWaitFor: "等待页面加载"
      - aiQuery: "描述页面显示的内容，是否有虚拟账户相关功能"
  - name: "策略组合页面验证"
    flow:
      - ai: "访问 /strategy-portfolio 页面"
      - aiWaitFor: "等待页面加载"
      - aiQuery: "描述页面显示的内容，是否有策略组合管理相关功能"
  - name: "策略性能页面验证"
    flow:
      - ai: "访问 /performance 页面"
      - aiWaitFor: "等待页面加载"
      - aiQuery: "描述页面显示的内容，是否有策略性能分析相关功能"
