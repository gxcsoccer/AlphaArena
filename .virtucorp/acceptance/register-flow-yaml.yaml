web:
  # NOTE: alphaarena.com and alphaarena.app domains are not configured to point to Vercel
  # Using the correct Vercel project URL for testing. Network connectivity issues in China may cause failures.
  # Issue #778: Fixed URL - alphaarena.vercel.app points to a different project
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "注册流程端到端验证"
    flow:
      - aiWaitFor: "页面加载完成"
      - ai: "导航到 /register 页面"
      - aiWaitFor: "注册页面加载完成，页面显示创建账户的表单"
      - ai: "生成一个随机邮箱，格式为 testqa_<timestamp>@example.com，填入邮箱输入框"
      - ai: "在用户名输入框中输入 testqa_user"
      - ai: "在密码输入框中输入 TestPass123!@#"
      - ai: "在确认密码输入框中再次输入 TestPass123!@#"
      - ai: "点击注册按钮提交表单"
      - sleep: 4000
      - aiAssert: "注册成功 - 页面跳转到交易页面（显示K线图、订单簿等交易界面）或显示成功消息，不再显示创建账户表单"