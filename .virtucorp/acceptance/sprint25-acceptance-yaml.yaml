web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "测试订阅管理页面"
    flow:
      - ai: "导航到订阅管理页面，URL 是 https://alpha-arena-two.vercel.app/subscription"
      - aiWaitFor: "页面加载完成，显示订阅计划内容"
      - aiAssert: "页面显示了订阅计划选项"
      - aiAssert: "页面显示了不同订阅等级的定价信息"
      - aiAssert: "页面有订阅或升级按钮"
  - name: "测试AI策略助手面板"
    flow:
      - ai: "导航到策略详情或交易页面，URL 是 https://alpha-arena-two.vercel.app"
      - aiWaitFor: "页面加载完成"
      - ai: "寻找并点击 AI 助手按钮或图标"
      - aiWaitFor: "AI 助手面板打开"
      - aiAssert: "AI 助手面板可见"
      - aiAssert: "面板中有输入框可以输入问题"
      - aiAssert: "面板显示 AI 相关的提示或欢迎信息"
  - name: "测试调度管理页面"
    flow:
      - ai: "导航到调度管理页面，URL 是 https://alpha-arena-two.vercel.app/scheduler"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面显示了调度任务列表或空状态提示"
      - aiAssert: "页面有创建新调度任务的按钮"
      - aiAssert: "页面的 UI 布局合理，导航清晰"
