web:
  # NOTE: alphaarena.com and alphaarena.app domains are not configured to point to Vercel
  # Using Vercel project URL for testing. Network connectivity issues in China may cause failures.
  url: "https://alphaarena.vercel.app"

tasks:
  - name: "首页验证"
    flow:
      - aiAssert: "页面显示了 APL 品牌名称或 logo"
  - name: "策略列表页面验证"
    flow:
      - ai: "导航到 /strategies 页面"
      - aiAssert: "页面正常响应（未登录用户会重定向到登录页，已登录用户看到策略列表）"
  - name: "实盘回测对比页面验证"
    flow:
      - ai: "导航到 /comparison/live-backtest 页面"
      - aiAssert: "实盘回测对比页面正常加载，没有报错信息"
