web:
  url: "https://alphaarena.app"

tasks:
  - name: "首页验证"
    flow:
      - aiAssert: "页面显示了 AlphaArena 品牌名称或 logo"
  - name: "策略列表页面验证"
    flow:
      - ai: "导航到 /strategies 页面"
      - aiAssert: "策略列表页面正常加载，没有报错信息"
  - name: "实盘回测对比页面验证"
    flow:
      - ai: "导航到 /comparison/live-backtest 页面"
      - aiAssert: "实盘回测对比页面正常加载，没有报错信息"
