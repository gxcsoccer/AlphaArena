web:
  # Production URL for automated smoke tests
  # For local testing, run: npm run build && npm run preview
  # Then override with: url: "http://localhost:4173"
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "Homepage Load"
    flow:
      - sleep: 3000
      - aiAssert: "页面标题包含 AlphaArena 或类似股票/交易相关的文字"
      - aiAssert: "页面主要内容区域可见（交易对列表、交易面板等），没有被白屏或加载失败阻塞"
      - aiAssert: "没有明显的 404 或 500 错误页面"
      - aiAssert: "页面布局正常，没有元素重叠或错位"
      - aiAssert: "页面功能正常，没有阻塞性问题（连接状态提示如果存在是可接受的，不存在也说明后端正常）"
  - name: "Navigation Test"
    flow:
      # Handle welcome popup for first-time visitors
      - ai: "如果页面出现欢迎弹窗（包含'欢迎使用 AlphaArena'或'欢迎来到 AlphaArena'文字），点击关闭按钮或'开始使用'按钮将其关闭；如果没有弹窗则继续"
      - sleep: 1000
      - aiAssert: "左侧导航栏可见，包含多个导航菜单项（如行情、Dashboard、Strategies、Trades等）"
      - ai: "点击左侧导航栏中的 Dashboard 菜单项"
      - sleep: 2000
      - aiAssert: "页面显示了仪表板相关内容（如统计卡片、图表、策略概览等）"
      - ai: "点击左侧导航栏中的 Trades 菜单项"
      - sleep: 2000
      - aiAssert: "页面显示了交易相关内容（如交易记录列表、订单历史等）"
      - aiAssert: "导航切换流畅，页面内容正确显示，没有错误或白屏"
  - name: "Core Functionality"
    flow:
      - sleep: 2000
      - aiAssert: "页面显示交易相关内容（K线图表、订单簿、交易面板，或策略统计卡片、图表等）"
      - ai: "如果当前在策略仪表盘页面，点击导航中的 Trades 或交易链接；否则继续验证当前页面"
      - sleep: 1000
      - aiAssert: "交易界面可见，包含交易记录、订单簿、交易面板，或交易分析图表（如交易分布图、成交量图等）"
      - ai: "滚动页面查看更多内容，验证页面滚动功能正常"
  - name: "Console Error Check"
    flow:
      - aiAssert: "页面没有显示红色 JavaScript 错误弹窗或崩溃提示"
      - aiAssert: "页面没有显示致命的 API 错误或白屏错误"
      - aiAssert: "所有图片和资源正常加载，没有破损的图片图标"
