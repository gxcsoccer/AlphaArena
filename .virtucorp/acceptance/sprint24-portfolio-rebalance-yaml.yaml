web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "再平衡页面加载"
    flow:
      - ai: "Navigate to /rebalance page"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面成功加载，显示了再平衡相关内容"
      - aiAssert: "页面标题包含 '再平衡' 或 'Rebalance' 字样"
  - name: "再平衡功能展示"
    flow:
      - ai: "Navigate to /rebalance page"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面显示了投资组合信息或资产配置"
      - aiAssert: "页面有再平衡选项或设置"
  - name: "再平衡操作按钮"
    flow:
      - ai: "Navigate to /rebalance page"
      - aiWaitFor: "页面加载完成"
      - ai: "查找再平衡按钮或执行再平衡的操作按钮"
      - aiAssert: "页面上有执行再平衡的按钮或操作入口"
