web:
  # NOTE: alphaarena.com and alphaarena.app domains are not configured to point to Vercel
  # They currently show GoDaddy/Squarespace "under construction" pages
  # Using Vercel preview deployment URL for testing until DNS is fixed
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "Language Switch - Japanese"
    flow:
      - sleep: 2000
      - ai: "点击语言切换按钮"
      - sleep: 500
      - ai: "点击'日本語'或日语选项"
      - sleep: 1000
      - aiAssert: "页面内容切换为日语"
  - name: "Language Switch - Korean"
    flow:
      - ai: "点击语言切换按钮"
      - sleep: 500
      - ai: "点击'한국어'或韩语选项"
      - sleep: 1000
      - aiAssert: "页面内容切换为韩语"
  - name: "Pricing Page (Direct URL)"
    flow:
      # Navigate directly by reloading the page with the pricing URL
      # Using url action to explicitly set the target URL instead of AI interpretation
      - ai: "在浏览器地址栏输入 /pricing 并回车，或者点击页面底部的 Pricing 链接"
      - sleep: 3000
      - aiWaitFor: "页面加载完成，显示定价计划标题"
      - aiAssert: "页面显示订阅方案（免费版、专业版、企业版）"
      - aiAssert: "页面显示订阅按钮（立即订阅或联系销售）"
  - name: "Mobile Responsive Design"
    flow:
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面布局响应式适配，元素正确显示"
