web:
  url: "https://alphaarena.app"

tasks:
  - name: "Language Switch - Japanese"
    flow:
      - sleep: 2000
      - ai: "点击语言切换按钮"
      - sleep: 500
      - ai: "点击'日本語'或日语选项"
      - sleep: 1000
      - aiAssert: "页面内容切换为日语"
  - name: "Language Switch - Korean"
    flow:
      - ai: "点击语言切换按钮"
      - sleep: 500
      - ai: "点击'한국어'或韩语选项"
      - sleep: 1000
      - aiAssert: "页面内容切换为韩语"
  - name: "Pricing Page (Direct URL)"
    flow:
      - ai: "直接导航到 /pricing URL"
      - sleep: 3000
      - aiAssert: "页面显示订阅方案（免费或企业版）"
      - aiAssert: "页面显示订阅按钮（立即订阅或联系销售）"
  - name: "Mobile Responsive Design"
    flow:
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面布局响应式适配，元素正确显示"
