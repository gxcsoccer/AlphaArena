web:
  # NOTE: alphaarena.com and alphaarena.app domains are not configured to point to Vercel
  # Using the correct Vercel project URL for testing. Network connectivity issues in China may cause failures.
  # Issue #778: Fixed URL - alphaarena.vercel.app points to a different project
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "首页可访问性测试"
    flow:
      - ai: "打开首页"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面显示了 AlphaArena 品牌名称或 logo"
      - aiAssert: "页面布局正常，没有显示错误信息"
  - name: "策略列表页面测试"
    flow:
      # IMPORTANT: Use relative URL to stay on configured domain. AI agent must NOT navigate to other domains.
      - ai: "在当前域名上导航到 /strategies 页面（使用相对路径，不要切换到其他域名）"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面正常响应（未登录用户会重定向到登录页，已登录用户看到策略列表）"
      - aiAssert: "页面没有显示错误信息或加载失败提示"
  - name: "实盘与回测对比页面测试"
    flow:
      # IMPORTANT: Use relative URL to stay on configured domain
      - ai: "在当前域名上导航到 /compare 页面（使用相对路径，不要切换到其他域名）"
      - aiWaitFor: "对比页面加载完成"
      - aiAssert: "页面显示了对比图表或数据"
      - aiAssert: "页面没有显示错误信息或加载失败提示"
