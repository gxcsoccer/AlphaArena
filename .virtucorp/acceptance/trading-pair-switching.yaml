# E2E Tests for Trading Pair Switching (Issue #174)
# Sprint 6 fixed multiple bugs related to trading pair switching.
# These tests prevent regression.

web:
  url: "https://alphaarena-eight.vercel.app"
  viewport:
    width: 1280
    height: 800

tasks:
  - name: "Test 1: Page load and trading pair list visibility"
    flow:
      - ai: "等待页面加载完成"
      - aiAssert: "页面正常显示，没有错误提示"
      - aiAssert: "交易对列表可见，显示多个交易对选项"
      - screenshot: "trading-pair-01-initial.png"

  - name: "Test 2: Switch to BTC/USD and verify data"
    flow:
      - ai: "在交易对列表中找到并点击 BTC 相关的交易对"
      - aiWaitFor: "等待 3 秒让数据加载"
      - aiAssert: "K线图表已加载，没有显示加载中或错误状态"
      - aiAssert: "订单簿显示买卖盘数据"
      - aiAssert: "交易面板显示正确的交易对"
      - screenshot: "trading-pair-02-btc.png"

  - name: "Test 3: Switch to ETH/USD and verify data updates"
    flow:
      - ai: "在交易对列表中找到并点击 ETH 相关的交易对"
      - aiWaitFor: "等待 3 秒让数据加载"
      - aiAssert: "K线图表已更新为 ETH 的数据"
      - aiAssert: "订单簿数据已更新"
      - aiAssert: "没有出现'removeChild'或'DOM'相关错误"
      - screenshot: "trading-pair-03-eth.png"

  - name: "Test 4: Rapid switching stability"
    flow:
      - ai: "快速连续点击 3 个不同的交易对，每个点击间隔约 1 秒"
      - aiWaitFor: "等待 3 秒让最后一个交易对的数据完全加载"
      - aiAssert: "页面状态稳定，没有卡死或崩溃"
      - aiAssert: "K线图表显示最后一个选择的交易对的数据"
      - aiAssert: "没有控制台错误或 race condition 相关问题"
      - screenshot: "trading-pair-04-rapid.png"

  - name: "Test 5: Data consistency across components"
    flow:
      - ai: "选择一个交易对（如 BTC）"
      - aiWaitFor: "等待 2 秒"
      - aiAssert: "K线图表、订单簿、交易面板都显示相同的交易对"
      - aiAssert: "价格数据在各组件间一致"
      - screenshot: "trading-pair-05-consistency.png"

  - name: "Test 6: Stock symbol switching (if available)"
    flow:
      - ai: "在交易对列表中查找股票交易对（如 AAPL）"
      - ai: "如果找到股票交易对，点击选择它"
      - aiWaitFor: "等待 3 秒让数据加载"
      - aiAssert: "股票交易对数据正常加载，没有错误"
      - screenshot: "trading-pair-06-stock.png"
