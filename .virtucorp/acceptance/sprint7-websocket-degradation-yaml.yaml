web:
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "页面加载和基础功能测试"
    flow:
      - ai: "打开页面并等待完全加载"
      - aiAssert: "页面成功加载，显示了Alpha Arena的主界面"
      - aiAssert: "没有显示'连接断开'或类似的错误提示"
      - aiAssert: "如果WebSocket不可用，页面显示了友好的提示信息而非技术性错误"
      - ai: "查找并点击交易对选择器"
      - aiAssert: "交易对选择器正常工作，可以切换不同的交易对"
      - aiWaitFor: "K线图组件加载完成"
      - aiAssert: "K线图正常渲染，显示了蜡烛图数据"
      - aiAssert: "订单簿组件正常显示，有买盘和卖盘数据"
