web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "寻找订单创建入口"
    flow:
      - ai: "查看导航菜单，寻找 'New Order'、'创建订单'、'交易' 或类似按钮"
      - ai: "如果找不到，尝试点击 Dashboard 返回首页，然后寻找创建订单的入口"
      - ai: "点击创建新订单或下单的按钮/链接"
      - aiWaitFor: "订单创建页面或面板出现"
  - name: "验证高级订单类型选项"
    flow:
      - ai: "在订单创建界面，查找订单类型选择器"
      - aiAssert: "存在订单类型选择选项，可能显示 '限价单'、'市价单' 或下拉菜单"
      - ai: "点击或展开订单类型选择器"
      - aiAssert: "下拉菜单或选项中包含高级订单类型，如 TWAP、Iceberg/冰山、OCO 等"
