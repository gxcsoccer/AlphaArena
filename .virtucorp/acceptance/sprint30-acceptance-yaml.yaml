web:
  url: "https://alpha-arena.vercel.app"

tasks:
  - name: "虚拟账户系统测试"
    flow:
      - ai: "打开页面并等待加载完成"
      - aiAssert: "页面显示了应用的主要界面"
      - ai: "查找并点击账户或钱包相关的入口按钮"
      - aiAssert: "可以看到虚拟账户相关功能，包括开户或账户管理选项"
      - ai: "如果看到开户按钮，点击尝试开户流程"
      - aiAssert: "开户流程或账户信息界面正常显示"
  - name: "模拟交易执行测试"
    flow:
      - ai: "导航到交易页面或交易相关入口"
      - aiAssert: "交易界面正常显示，可以看到交易对或交易选项"
      - ai: "查找下单相关的界面元素，如买入卖出按钮"
      - aiAssert: "可以看到下单功能，包括价格、数量输入等交易参数"
      - ai: "如果需要登录才能交易，验证有登录提示；如果可以体验模拟交易，验证下单流程可用"
  - name: "策略性能分析测试"
    flow:
      - ai: "查找策略或绩效分析相关的导航入口"
      - ai: "点击进入策略性能或绩效分析页面"
      - aiAssert: "策略性能分析页面正常显示"
      - aiAssert: "可以看到绩效指标展示，如收益率、回撤、夏普比率等"
      - aiAssert: "图表或数据可视化正常展示"
  - name: "策略组合管理测试"
    flow:
      - ai: "查找组合管理或Portfolio相关的入口"
      - ai: "点击进入组合管理页面"
      - aiAssert: "组合管理页面正常显示"
      - aiAssert: "可以看到创建组合或管理现有组合的功能"
      - ai: "验证组合列表或创建组合的界面元素存在"
