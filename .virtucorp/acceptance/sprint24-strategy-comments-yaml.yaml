web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "进入策略详情页"
    flow:
      - ai: "Navigate to the home page"
      - ai: "Click on a strategy card or find a strategy to view details"
      - aiWaitFor: "策略详情页加载完成"
      - aiAssert: "页面上显示了策略详情信息"
  - name: "评论功能展示"
    flow:
      - ai: "在策略详情页查找评论区或评论输入框"
      - aiAssert: "页面上有评论区域或评论输入框"
      - aiAssert: "评论输入框可见且可以输入"
  - name: "评论发布功能"
    flow:
      - ai: "在评论输入框中输入测试评论 '这是一条测试评论'"
      - ai: "点击提交或发送评论按钮"
      - aiWaitFor: "评论提交完成"
      - aiAssert: "评论成功提交或显示了评论预览"
