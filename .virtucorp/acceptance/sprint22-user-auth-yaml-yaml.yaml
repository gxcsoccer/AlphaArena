web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "登录页面测试"
    flow:
      - ai: "导航到 /login 页面"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面显示了登录表单，包含用户名/邮箱输入框和密码输入框"
      - aiAssert: "页面有登录按钮"
      - aiAssert: "页面有跳转到注册页面的链接"
  - name: "注册页面测试"
    flow:
      - ai: "导航到 /register 页面"
      - aiWaitFor: "页面加载完成"
      - aiAssert: "页面显示了注册表单"
      - aiAssert: "表单包含必要的输入字段（如用户名、邮箱、密码、确认密码）"
      - aiAssert: "页面有注册按钮"
      - aiAssert: "页面有跳转到登录页面的链接"
