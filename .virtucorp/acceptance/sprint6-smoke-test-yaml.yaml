web:
  url: "https://alphaarena-eight.vercel.app"

tasks:
  - name: "Homepage Load Test"
    flow:
      - ai: "等待页面加载完成"
      - aiAssert: "页面成功加载，显示股票/交易对列表"
  - name: "Trading Pair Detail Test"
    flow:
      - ai: "点击第一个交易对（如 BTC/USD）"
      - aiWaitFor: "交易详情页面加载完成"
      - aiAssert: "显示交易对详情，包括价格图表和交易信息"
  - name: "Trading Functionality Test"
    flow:
      - ai: "在交易页面找到买入/卖出表单"
      - aiAssert: "买入和卖出按钮可见且可点击"
      - aiAssert: "可以输入交易数量"
  - name: "Conditional Order Test (Issue #95)"
    flow:
      - ai: "找到条件订单创建入口"
      - aiInput: "设置条件订单参数：价格条件和数量"
      - ai: "提交条件订单"
      - aiAssert: "条件订单创建成功，显示在订单列表中"
  - name: "Price Alert Test (Issue #100)"
    flow:
      - ai: "找到价格提醒创建入口"
      - aiInput: "设置价格提醒：目标价格和提醒方式"
      - ai: "提交价格提醒"
      - aiAssert: "价格提醒创建成功，显示在提醒列表中"
  - name: "Real-time Data Update Test"
    flow:
      - aiWaitFor: "等待 10 秒观察数据更新"
      - aiAssert: "价格数据有实时更新，显示时间戳或价格变化"
