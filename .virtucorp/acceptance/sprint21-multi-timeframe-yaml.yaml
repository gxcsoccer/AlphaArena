web:
  url: "https://alpha-arena-two.vercel.app"

tasks:
  - name: "访问交易页面"
    flow:
      - ai: "导航到首页或交易页面"
      - aiAssert: "页面加载完成，显示 K 线图表或交易界面"
  - name: "多时间框架切换"
    flow:
      - ai: "寻找时间框架选择器，通常在图表上方"
      - aiAssert: "存在时间框架切换选项，如 1m, 5m, 15m, 1h, 4h, 1d 等"
      - ai: "切换到 5 分钟 K 线时间框架"
      - aiWaitFor: "K 线图表更新为新时间框架的数据"
  - name: "验证时间框架切换功能"
    flow:
      - ai: "切换到 1 小时时间框架"
      - aiWaitFor: "图表更新显示 1 小时 K 线"
      - aiAssert: "K 线图表显示了新的时间框架数据"
